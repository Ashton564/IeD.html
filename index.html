<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkCode | Private</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/commonlisp/commonlisp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/haskell/haskell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/fortran/fortran.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/gas/gas.min.js"></script>

  <style>
    :root {
      --bg-darker: #050508; --bg-main: #0a0a12; --bg-panel: #12121e;
      --accent: #cba6f7; --text: #cdd6f4; --subtext: #585b70;
      --green: #a6e3a1; --red: #f38ba8; --blue: #89b4fa; --orange: #fab387;
    }

    body, html { margin: 0; height: 100%; font-family: 'Consolas', monospace; background: var(--bg-main); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

    header { 
        height: 55px; padding: 0 15px; background: var(--bg-darker); 
        display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #1e1e2e; 
    }

    h2 { margin: 0; font-size: 0.8rem; color: var(--accent); letter-spacing: 4px; font-weight: 900; text-transform: uppercase; }
    
    select, button, label { padding: 6px 12px; font-size: 10px; border-radius: 2px; border: 1px solid #313244; cursor: pointer; background: var(--bg-panel); color: var(--text); font-weight: bold; }
    
    .btn-run { background: var(--green); color: #11111b; border: none; }
    .btn-bin { background: var(--orange); color: #11111b; border: none; }
    .btn-clear { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .panic-label { font-size: 9px; color: var(--red); opacity: 0.6; margin-left: 10px; }

    .workspace { display: flex; flex: 1; gap: 4px; padding: 4px; box-sizing: border-box; }
    .editor-pane, .output-pane { flex: 1; display: flex; flex-direction: column; border: 1px solid #1e1e2e; background: #11111b; overflow: hidden; }
    
    .pane-header { background: #000; padding: 6px 12px; font-size: 9px; color: var(--subtext); border-bottom: 1px solid #1e1e2e; }
    .CodeMirror { flex: 1; height: 100%; font-size: 13px; }
    #console-output { flex: 1; background: #000; color: var(--green); padding: 12px; overflow-y: auto; white-space: pre-wrap; margin: 0; font-size: 11px; }
    
    .status-bar { height: 22px; background: #000; border-top: 1px solid #1e1e2e; display: flex; align-items: center; padding: 0 15px; font-size: 10px; color: var(--subtext); gap: 20px; }
    
    input[type="file"] { display: none; }
    .void-active { filter: contrast(1.2) brightness(0.4) grayscale(1); background: #000 !important; }
  </style>
</head>
<body id="app-body">

  <header>
    <h2>DarkCode</h2>
    <select id="language-select">
      <option value="binary">Binary</option>
      <option value="c">C (Kernel)</option>
      <option value="asm64">Assembly</option>
      <option value="commonlisp">Lisp</option>
      <option value="haskell">Haskell</option>
      <option value="fortran">Fortran</option>
    </select>
    
    <button id="run-btn" class="btn-run">RUN CHECK</button>
    <button id="bin-btn" class="btn-bin">EXPORT .BIN</button>
    
    <label for="import-file" style="background: var(--blue); color: #000; border:none;">IMPORT .BIN</label>
    <input type="file" id="import-file">

    <button id="clear-btn" class="btn-clear">WIPE</button>
    <span class="panic-label">[ESC] PANIC</span>

    <div style="flex:1"></div>
    <div style="font-size: 9px; color: var(--subtext);">VOID <input type="range" id="void-slider" min="0" max="1" step="1" value="0" style="width:20px; vertical-align: middle;"></div>
  </header>

  <div class="workspace">
    <div class="editor-pane">
      <div class="pane-header">Input Stream</div>
      <textarea id="code-editor"></textarea>
    </div>
    <div class="output-pane">
      <div class="pane-header">System Log (Local Only)</div>
      <pre id="console-output"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span id="stat-lines">Lines: 1</span>
    <span id="stat-bytes" style="color: var(--accent)">Bytes: 0</span>
    <span style="margin-left:auto; color: var(--red); font-weight:bold;">OFFLINE MODE ACTIVE</span>
  </div>

  <script>
    const storageKey = 'darkcode_v8_private';
    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        theme: 'dracula', lineNumbers: true, lineWrapping: true
    });

    const consoleOut = document.getElementById('console-output');
    const langSelect = document.getElementById('language-select');

    // Load Session
    const saved = localStorage.getItem(storageKey);
    if (saved) editor.setValue(saved);

    // PANIC FUNCTION
    const wipeAll = () => {
        editor.setValue("");
        localStorage.removeItem(storageKey);
        consoleOut.innerText = "!!! PANIC WIPE EXECUTED !!!\nAll local buffers cleared.";
    };

    window.addEventListener('keydown', (e) => { if(e.key === "Escape") wipeAll(); });
    document.getElementById('clear-btn').onclick = () => { if(confirm("Clear workspace?")) wipeAll(); };

    // Export .BIN
    document.getElementById('bin-btn').onclick = () => {
        const raw = editor.getValue().replace(/[^01]/g, '');
        const bytes = [];
        for (let i = 0; i < raw.length; i += 8) {
            bytes.push(parseInt(raw.substr(i, 8).padEnd(8, '0'), 2));
        }
        const blob = new Blob([new Uint8Array(bytes)], {type: "application/octet-stream"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "firmware.bin";
        a.click();
        URL.revokeObjectURL(url);
    };

    // Import .BIN (Local Only)
    document.getElementById('import-file').onchange = (e) => {
        const file = e.target.files;
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const bytes = new Uint8Array(event.target.result);
            let bin = "";
            for (let i = 0; i < bytes.length; i++) {
                bin += bytes[i].toString(2).padStart(8, '0') + " ";
                if ((i + 1) % 4 === 0) bin += "\n";
            }
            editor.setValue(bin);
            consoleOut.innerText = `> Local Read: ${file.name} successfully parsed to memory.`;
        };
        reader.readAsArrayBuffer(file);
    };

    editor.on('change', () => {
        const val = editor.getValue();
        localStorage.setItem(storageKey, val);
        const rawBin = val.replace(/[^01]/g, '');
        document.getElementById('stat-lines').innerText = `Lines: ${editor.lineCount()}`;
        document.getElementById('stat-bytes').innerText = `Bytes: ${Math.ceil(rawBin.length / 8)}`;
    });

    document.getElementById('run-btn').onclick = () => {
        consoleOut.innerText = "> Local logic check: 0 errors. Data has not left this machine.";
    };

    document.getElementById('void-slider').oninput = (e) => {
        document.getElementById('app-body').className = e.target.value == "1" ? "void-active" : "";
    };
  </script>
</body>
</html>
